<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Magic Hour GWA ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Old+Mincho:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --comet-glow: #00d4ff;
            --sunset-pink: #ff4d6d;
            --night-blue: #1a1a2e;
        }

        html, body {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            /* FALLBACK GRADIENT: If video fails, this sky appears */
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #4b3d60 70%, #ff7e5f 100%);
            font-family: 'Kosugi Maru', sans-serif;
            overflow-x: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -10;
            filter: brightness(0.6) contrast(1.1);
            pointer-events: none;
            display: none; 
        }

        /* Responsive Video Toggle */
        @media (orientation: portrait) { #bg-portrait { display: block !important; } }
        @media (orientation: landscape) { #bg-landscape { display: block !important; } }

        .container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; width: 100%; padding: 15px;
            box-sizing: border-box;
            background: transparent !important;
        }

        .calc-card {
            background: rgba(26, 26, 46, 0.75); /* Darker frost for readability */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem; border-radius: 15px;
            width: 100%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            text-align: center; color: white;
        }

        h1 { 
            font-family: 'Zen Old Mincho', serif; margin: 0;
            color: #fff; font-size: clamp(1.8rem, 8vw, 2.4rem); 
            text-shadow: 0 0 10px var(--comet-glow);
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.65rem; margin-bottom: 25px; opacity: 0.8;
            letter-spacing: 4px; text-transform: uppercase; color: var(--comet-glow);
        }

        .label-grid, .row {
            display: grid; grid-template-columns: 1.2fr 1fr 40px;
            gap: 10px; margin-bottom: 12px;
        }

        .label-grid { font-size: 0.65rem; font-weight: bold; opacity: 0.7; }

        input {
            width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05); color: #fff;
            border-radius: 4px; text-align: center; font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--comet-glow); outline: none; background: rgba(255, 255, 255, 0.1); }

        button { cursor: pointer; border: none; font-family: 'Kosugi Maru', sans-serif; transition: 0.3s; }

        .btn-add { 
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.9); 
            color: #1a1a2e; font-weight: bold; border-radius: 4px; 
        }

        .btn-pdf { 
            width: 100%; padding: 10px; 
            background: linear-gradient(45deg, var(--comet-glow), var(--sunset-pink));
            color: white; font-weight: bold; border-radius: 4px; margin-top: 15px;
        }

        .btn-clear { 
            width: 100%; padding: 8px; background: transparent; 
            color: white; opacity: 0.5; margin-top: 10px; font-size: 0.7rem;
        }

        .btn-remove { background: transparent; color: var(--sunset-pink); font-size: 1.2rem; }

        .result-section { margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 20px; }
        
        #gwa-display { 
            font-size: 4rem; color: #fff; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); 
            font-family: 'Zen Old Mincho', serif;
        }
    </style>
</head>
<body>

    <video id="bg-portrait" class="video-bg" autoplay muted loop playsinline preload="auto">
        <source src="mitsuhap.mp4" type="video/mp4">
    </video>
    <video id="bg-landscape" class="video-bg" autoplay muted loop playsinline preload="auto">
        <source src="mitsuhal.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="calc-card" id="export-area">
            <h1>君の名は。</h1>
            <p class="subtitle">GWA Calculator</p>

            <div class="label-grid"><span>Grade</span><span>Units</span><span></span></div>
            <div id="grades-container"></div>

            <button class="btn-add" onclick="addRow()">+ Add Course</button>
            <button class="btn-pdf" onclick="downloadPDF()">Export PDF</button>
            <button class="btn-clear" onclick="clearAll()">Reset All</button>

            <div class="result-section">
                <span id="gwa-display">0.00</span>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('grades-container');
        const display = document.getElementById('gwa-display');

        function addRow() {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="number" step="0.01" class="grade-input" placeholder="0.00" oninput="calculateGWA()">
                <input type="number" step="0.5" class="unit-input" placeholder="0" oninput="calculateGWA()">
                <button class="btn-remove" onclick="removeRow(this)">✕</button>
            `;
            container.appendChild(row);
        }

        function removeRow(btn) { btn.parentElement.remove(); calculateGWA(); }

        function calculateGWA() {
            const grades = document.querySelectorAll('.grade-input'), units = document.querySelectorAll('.unit-input');
            let pts = 0, uTotal = 0;
            grades.forEach((gIn, i) => {
                const g = parseFloat(gIn.value), u = parseFloat(units[i].value);
                if (!isNaN(g) && !isNaN(u)) { pts += (g * u); uTotal += u; }
            });
            display.innerText = uTotal > 0 ? (pts / uTotal).toFixed(2) : "0.00";
        }

        function clearAll() { container.innerHTML = ''; display.innerText = "0.00"; addRow(); }

        function downloadPDF() {
            const element = document.getElementById('export-area');
            const btns = element.querySelectorAll('button');
            btns.forEach(b => b.style.display = 'none');

            html2pdf().set({
                margin: 0.2, filename: 'Mitsuha_GWA.pdf', image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#1a1a2e' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).from(element).save().then(() => {
                btns.forEach(b => b.style.display = 'inline-block');
            });
        }

        // Handle autoplay restrictions
        window.onload = () => {
            addRow();
            const playVids = () => {
                document.querySelectorAll('video').forEach(v => v.play());
            };
            document.addEventListener('touchstart', playVids, {once: true});
            document.addEventListener('click', playVids, {once: true});
        };
    </script>
</body>
</html>
