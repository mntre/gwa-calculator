<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Magic Hour GWA ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Old+Mincho:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --comet-glow: #00d4ff;
            --sunset-pink: #ff4d6d;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #1a1a2e; /* Fallback color */
            font-family: 'Kosugi Maru', sans-serif;
            overflow-x: hidden;
        }

        /* VIDEO BACKGROUND SYSTEM */
        .video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -10;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6) contrast(1.1);
            pointer-events: none;
            display: none; /* Hidden by default */
        }

        /* Show mobile-video only on Portrait */
        @media (orientation: portrait) {
            #mobile-video { display: block; }
        }

        /* Show desktop-video only on Landscape */
        @media (orientation: landscape) {
            #desktop-video { display: block; }
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; width: 100%; padding: 15px;
            box-sizing: border-box;
        }

        .calc-card {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem; border-radius: 15px;
            width: 100%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            text-align: center; color: white;
        }

        h1 { 
            font-family: 'Zen Old Mincho', serif; margin: 0;
            color: #fff; font-size: clamp(1.6rem, 8vw, 2.4rem); 
            text-shadow: 0 0 10px var(--comet-glow);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.65rem; margin-bottom: 25px; 
            letter-spacing: 4px; color: var(--comet-glow); text-transform: uppercase;
        }

        .row { display: grid; grid-template-columns: 1.2fr 1fr 40px; gap: 10px; margin-bottom: 12px; }

        input {
            width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05); color: #fff;
            border-radius: 4px; text-align: center;
        }

        button { cursor: pointer; border: none; font-family: 'Kosugi Maru', sans-serif; transition: 0.3s; }

        .btn-add { width: 100%; padding: 12px; background: #fff; color: #1a1a2e; font-weight: bold; border-radius: 4px; }
        
        .btn-pdf { 
            width: 100%; padding: 10px; 
            background: linear-gradient(45deg, var(--comet-glow), var(--sunset-pink));
            color: white; font-weight: bold; border-radius: 4px; margin-top: 15px;
        }

        .btn-remove { background: transparent; color: var(--sunset-pink); font-size: 1.2rem; }

        #gwa-display { 
            font-size: 4rem; font-family: 'Zen Old Mincho', serif; 
            display: block; margin-top: 20px; 
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="mobile-video" class="video-bg">
        <source src="mitsuhap.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline id="desktop-video" class="video-bg">
        <source src="mitsuhal.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="calc-card" id="export-area">
            <h1>君の名は。</h1>
            <p class="subtitle">GWA Calculator</p>
            
            <div id="grades-container"></div>

            <button class="btn-add" onclick="addRow()">+ Add Course</button>
            <button class="btn-pdf" onclick="downloadPDF()">Export PDF</button>

            <span id="gwa-display">0.00</span>
        </div>
    </div>

    <script>
        const container = document.getElementById('grades-container');
        const display = document.getElementById('gwa-display');

        function addRow() {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="number" step="0.01" class="grade-input" placeholder="0.00" oninput="calculateGWA()">
                <input type="number" step="0.5" class="unit-input" placeholder="0" oninput="calculateGWA()">
                <button class="btn-remove" onclick="removeRow(this)">✕</button>
            `;
            container.appendChild(row);
        }

        function removeRow(btn) { btn.parentElement.remove(); calculateGWA(); }

        function calculateGWA() {
            const grades = document.querySelectorAll('.grade-input'), units = document.querySelectorAll('.unit-input');
            let pts = 0, uTotal = 0;
            grades.forEach((gIn, i) => {
                const g = parseFloat(gIn.value), u = parseFloat(units[i].value);
                if (!isNaN(g) && !isNaN(u)) { pts += (g * u); uTotal += u; }
            });
            display.innerText = uTotal > 0 ? (pts / uTotal).toFixed(2) : "0.00";
        }

        function downloadPDF() {
            const element = document.getElementById('export-area');
            const btns = element.querySelectorAll('button');
            btns.forEach(b => b.style.display = 'none');

            html2pdf().set({
                margin: 0.2, filename: 'GWA_Result.pdf', image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#1a1a2e' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).from(element).save().then(() => {
                btns.forEach(b => b.style.display = 'inline-block');
            });
        }

        // Kickstart videos on interaction
        window.onload = () => {
            addRow();
            const playVids = () => {
                document.querySelectorAll('video').forEach(v => v.play());
            };
            document.addEventListener('touchstart', playVids, {once: true});
            document.addEventListener('click', playVids, {once: true});
        };
    </script>
</body>
</html>
