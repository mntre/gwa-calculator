<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itomori Registry | snapshot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Zen+Old+Mincho:wght@700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0c0c1d; margin: 0; padding: 0; }

        .glass-card {
            background: rgba(15, 15, 35, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            margin: 0 auto;
            overflow: hidden;
            width: 100%;
            max-width: 448px; /* Tailwind max-w-md */
        }

        /* Video logic matching your working files */
        .video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -100; transform: translateX(-50%) translateY(-50%);
            object-fit: cover; filter: brightness(0.5);
        }

        #mobile-video { display: block; }
        #desktop-video { display: none; }
        @media (min-width: 768px) {
            #mobile-video { display: none; }
            #desktop-video { display: block; }
        }

        .comet-glow { text-shadow: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 30px rgba(255, 77, 109, 0.3); }

        input {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white; text-align: center;
        }
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">

    <video autoplay muted loop playsinline id="mobile-video" class="video-bg">
        <source src="mitsuhap.mp4" type="video/mp4">
    </video>
    <video autoplay muted loop playsinline id="desktop-video" class="video-bg">
        <source src="mitsuhal.mp4" type="video/mp4">
    </video>

    <div class="fixed inset-0 bg-gradient-to-b from-indigo-950/40 via-slate-900/70 to-orange-900/20 -z-[90]"></div>

    <div class="relative z-10 min-h-screen flex items-center justify-center py-12 px-6">
        <div class="w-full max-w-md">
            
            <div class="text-center mb-8" id="header-section">
                <div class="relative inline-block">
                    <h1 class="text-5xl font-black italic tracking-tighter comet-glow" style="font-family: 'Zen Old Mincho', serif;">君の名は。</h1>
                    <div class="absolute -top-4 -right-8 bg-pink-500 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest border-2 border-black shadow-lg">Itomori</div>
                </div>
                <p class="text-cyan-400 font-mono tracking-[0.4em] uppercase text-[10px] mt-4">Itomori Academic Registry</p>
            </div>

            <div id="export-area" class="glass-card p-8 rounded-[2.5rem] shadow-2xl relative transition-all duration-300">
                
                <div id="snapshot-header" class="hidden text-center mb-6">
                    <h2 class="text-3xl font-bold italic" style="color: #fff; font-family: 'Zen Old Mincho', serif; text-shadow: 0 0 15px rgba(255,255,255,0.4);">SNAPSHOT GWA REPORT</h2>
                    <div class="h-px bg-cyan-500/50 w-full my-4"></div>
                </div>

                <div id="label-header" class="grid grid-cols-[1fr_1fr_40px] gap-4 mb-4 text-[10px] font-bold uppercase tracking-[0.2em] text-cyan-400/80">
                    <span>Grade</span><span>Units</span><span></span>
                </div>

                <div id="grades-container" class="space-y-3 mb-6"></div>

                <div class="space-y-4" id="ui-buttons">
                    <button onclick="addRow()" class="w-full py-3 bg-white/90 text-indigo-950 font-black uppercase tracking-tighter italic rounded-xl hover:scale-[1.02] active:scale-95 transition-all">+ Add Subject</button>
                    <button onclick="takeSnapshot()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-pink-500 text-white font-bold uppercase text-xs tracking-widest rounded-xl shadow-lg transform active:scale-95 transition-all">Snapshot</button>
                    <button onclick="clearAll()" class="w-full py-2 text-slate-500 hover:text-orange-400 text-[10px] font-bold uppercase tracking-[0.2em]">Reset Musubi</button>
                </div>

                <div class="mt-8 pt-6 border-t border-white/10 text-center">
                    <p class="text-[10px] font-mono text-pink-400 uppercase tracking-widest mb-1">Final Result</p>
                    <div id="gwa-display" class="text-6xl font-black italic comet-glow" style="font-family: 'Zen Old Mincho', serif;">0.00</div>
                </div>
            </div>

            <div class="mt-8 text-center" id="footer-text">
                <p class="text-slate-500 text-[9px] uppercase tracking-[0.6em]">Syncing with Katawaredoki...</p>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('grades-container');
        const display = document.getElementById('gwa-display');

        function addRow() {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-[1fr_1fr_40px] gap-4 items-center mb-3 grade-row';
            row.innerHTML = `
                <input type="number" step="0.01" class="grade-input w-full p-3 rounded-xl font-bold" placeholder="1.00" oninput="calculateGWA()">
                <input type="number" step="0.5" class="unit-input w-full p-3 rounded-xl font-bold" placeholder="3.0" oninput="calculateGWA()">
                <button onclick="removeRow(this)" class="text-pink-500 text-xl delete-btn">✕</button>
            `;
            container.appendChild(row);
        }

        function removeRow(btn) { btn.parentElement.remove(); calculateGWA(); }

        function calculateGWA() {
            const grades = document.querySelectorAll('.grade-input'), units = document.querySelectorAll('.unit-input');
            let pts = 0, uTotal = 0;
            grades.forEach((gIn, i) => {
                const g = parseFloat(gIn.value), u = parseFloat(units[i].value);
                if (!isNaN(g) && !isNaN(u)) { pts += (g * u); uTotal += u; }
            });
            display.innerText = uTotal > 0 ? (pts / uTotal).toFixed(2) : "0.00";
        }

        function clearAll() { container.innerHTML = ''; display.innerText = "0.00"; addRow(); }

        async function takeSnapshot() {
            const element = document.getElementById('export-area');
            const mainBtns = document.getElementById('ui-buttons');
            const snapshotHeader = document.getElementById('snapshot-header');
            const deleteBtns = document.querySelectorAll('.delete-btn');
            const inputs = document.querySelectorAll('input');

            // 1. Snapshot Mode: Add background, hide UI
            mainBtns.style.display = 'none';
            snapshotHeader.classList.remove('hidden');
            deleteBtns.forEach(b => b.style.visibility = 'hidden');
            
            // Temporary styles to create a "Document" centered on mitsuha.jpg
            element.style.backgroundImage = "url('mitsuha.jpg')";
            element.style.backgroundSize = "cover";
            element.style.backgroundPosition = "center";
            element.style.borderRadius = "0px";
            element.style.padding = "4rem"; // Add padding so Mitsuha photo shows
            element.style.width = "800px"; // Fixed width for consistent image aspect ratio
            element.style.margin = "0 auto"; // Centers the card within the snapshot width

            // Make inputs look like flat numbers in the image
            inputs.forEach(i => {
                i.style.background = "rgba(0,0,0,0.3)";
                i.style.border = "none";
            });

            // 2. Capture and Download as PNG
            try {
                const canvas = await html2canvas(element, {
                    useCORS: true,
                    scale: 3, // Super high quality
                    backgroundColor: '#0c0c1d',
                    scrollY: -window.scrollY // Fixes capturing white space
                });

                const imgData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = imgData;
                link.download = 'Itomori_Academic_Registry_Musubi.png';
                link.click();
            } catch (err) {
                console.error("Snapshot failed", err);
            } finally {
                // 3. Restore Live Website Styles
                mainBtns.style.display = 'block';
                snapshotHeader.classList.add('hidden');
                deleteBtns.forEach(b => b.style.visibility = 'visible');
                element.style.backgroundImage = "none";
                element.style.borderRadius = "2.5rem";
                element.style.padding = "2rem"; // Restore default p-8
                element.style.width = "100%";
                element.style.maxWidth = "448px";
                inputs.forEach(i => {
                    i.style.background = "";
                    i.style.border = "";
                });
            }
        }

        window.onload = () => { addRow(); };
    </script>
</body>
</html>
